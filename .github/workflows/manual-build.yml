name: Manual Build

on:
  workflow_dispatch:
    inputs:
      os:
        description: 'Target Operating System'
        required: true
        default: 'linux'
        type: choice
        options:
        - linux
        - windows
        - darwin
      arch:
        description: 'Target Architecture'
        required: true
        default: 'amd64'
        type: choice
        options:
        - amd64
        - arm64

jobs:
  build:
    name: Build All Binaries
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'
        cache: true

    - name: Install Dependencies
      run: go mod download

    - name: Build cmd/ directory
      env:
        GOOS: ${{ github.event.inputs.os }}
        GOARCH: ${{ github.event.inputs.arch }}
      run: |
        echo "Building all packages in ./cmd/ for $GOOS/$GOARCH..."
        
        # Create a dedicated output folder to hold all the binaries
        mkdir -p build_output
        
        # Build everything inside cmd/ and drop the executables into build_output/
        # Go automatically adds the .exe extension if GOOS is set to windows
        go build -v -o builds/ ./cmd/...

    - name: Upload Binaries Artifact
      uses: actions/upload-artifact@v4
      with:
        name: egs-watch-binaries-${{ github.event.inputs.os }}-${{ github.event.inputs.arch }}
        path: builds/
        retention-days: 1
